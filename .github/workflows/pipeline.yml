name: MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: pip install mlflow

      - name: Run training
        run: python train.py

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

      - name: Upload accuracy
        uses: actions/upload-artifact@v4
        with:
          name: accuracy
          path: accuracy.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model_info

      - name: Download accuracy
        uses: actions/download-artifact@v4
        with:
          name: accuracy

      - name: Check accuracy
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          echo Building Docker image for Run ID:
          cat model_info.txt
          